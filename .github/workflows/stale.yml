name: Close stale issues
on:
  schedule:
    - cron: '0 9 * * 1'
permissions:
  issues: write
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: '此 Issue 已超过 30 天无活动，即将自动关闭。如仍需处理请回复。'
          days-before-stale: 30
          days-before-close: 7
