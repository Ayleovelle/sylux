name: '🐛 报告 Bug'
description: 提交报告帮助我们改进。
title: '[Bug] '
labels: ['type/fix']
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间报告问题！请准确解释您的问题。如果可能，请提供一个可复现的片段。

  - type: textarea
    attributes:
      label: 发生了什么
      description: 描述你遇到的异常。
      placeholder: 一个清晰且具体的描述这个异常是什么。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何复现？
      description: 复现该问题的步骤。
      placeholder: '如: 1. 运行 node src/run.mjs ...'
    validations:
      required: true

  - type: input
    attributes:
      label: sylux 版本
      description: 请填写你当前使用的版本。
      placeholder: '如: v0.2.0-preview'
    validations:
      required: true

  - type: input
    attributes:
      label: Node.js 版本
      description: 运行 node --version 获取。
      placeholder: '如: v22.13.0'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 操作系统
      options:
        - 'Windows'
        - 'macOS'
        - 'Linux'
        - 'Other'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 报错日志
      description: 终端输出或 runs/ 目录下的 jsonl/fixture 片段。
      placeholder: 请提供完整的报错日志或截图。
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: 我已阅读并同意遵守该项目的行为准则。
          required: true
