<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sylux · 观战面板</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --dim:#8b949e; --line:#30363d; --txt:#e6edf3; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.6 -apple-system,"Segoe UI",system-ui,sans-serif; }
  header { padding:12px 20px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:center; flex-wrap:wrap; position:sticky; top:0; background:var(--bg); z-index:2; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  .meta { color:var(--dim); font-size:12px; }
  .pill { padding:2px 8px; border-radius:10px; font-size:11px; border:1px solid var(--line); }
  .pill.live { color:#3fb950; border-color:#238636; }
  .pill.done { color:#58a6ff; border-color:#1f6feb; }
  .pill.stall { color:#d29922; border-color:#9e6a03; }
  .pill.err { color:#f85149; border-color:#da3633; }
  #log { max-width:980px; margin:0 auto; padding:20px; }
  .msg { background:var(--panel); border:1px solid var(--line); border-left-width:3px; border-radius:8px; padding:10px 14px; margin:12px 0; }
  .msg .hd { display:flex; gap:10px; align-items:center; font-size:12px; color:var(--dim); margin-bottom:6px; flex-wrap:wrap; }
  .msg .who { font-weight:700; color:var(--txt); }
  .msg .body { white-space:pre-wrap; word-break:break-word; font-size:13px; }
  .msg .ev { margin-top:8px; border-top:1px dashed var(--line); padding-top:6px; font-size:12px; color:#d29922; }
  .msg .ev div { margin:2px 0; }
  .usage { font-family:ui-monospace,Consolas,monospace; font-size:11px; color:var(--dim); }
  /* role 着色 */
  .r-author,.r-driver { border-left-color:#58a6ff; }
  .r-critic { border-left-color:#f85149; }
  .r-lead { border-left-color:#d29922; }
  .r-worker { border-left-color:#3fb950; }
  .r-navigator { border-left-color:#bc8cff; }
  .r-lead .who { color:#d29922; } .r-critic .who { color:#f85149; }
  .r-worker .who { color:#3fb950; } .r-navigator .who { color:#bc8cff; }
  .r-author .who,.r-driver .who { color:#58a6ff; }
  .status-row { background:#1c1408; border-color:#9e6a03; }
  #foot { max-width:980px; margin:0 auto 40px; padding:0 20px; color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>sylux 观战</h1>
  <span class="pill" id="pb">—</span>
  <span class="meta" id="task">连接中…</span>
  <span style="flex:1"></span>
  <span class="usage" id="tok">token ≈ 0</span>
  <span class="pill live" id="conn">连接中</span>
</header>
<div id="log"></div>
<div id="foot"></div>
<script src="/panel.js"></script>
</body>
</html>
